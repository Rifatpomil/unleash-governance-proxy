name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: unleash_governance
        ports: ["5433:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 5s --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint (syntax)
        run: python -m compileall -q app tests migrations

      - name: Run unit + contract tests (SQLite, fast)
        env:
          JWT_SECRET: ci-secret
        run: pytest -q --ignore=tests/evals/test_agent_live_eval.py --ignore=tests/load

      - name: Run golden evals (no LLM)
        env:
          JWT_SECRET: ci-secret
        run: pytest -q tests/evals -k "not live"

      - name: Run concurrency + audit-chain tests
        env:
          JWT_SECRET: ci-secret
        run: pytest -q tests/test_concurrency.py tests/test_audit_chain.py

      - name: Run Postgres-backed tests
        env:
          JWT_SECRET: ci-secret
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5433/unleash_governance
        run: pytest -q tests/test_api.py tests/test_audit_chain.py

  live-eval:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || contains(github.event.head_commit.message, '[live-eval]')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Live LLM evals
        env:
          RUN_LIVE_EVALS: "1"
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          JWT_SECRET: ci-secret
        run: pytest -v tests/evals/test_agent_live_eval.py
